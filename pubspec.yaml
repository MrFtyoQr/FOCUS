name: hipperapp
description: HiperApp — Sistema de Hiperproductividad · Tree Tech Solutions
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Estado
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navegación
  go_router: ^13.2.0

  # Almacenamiento seguro (JWT)
  flutter_secure_storage: ^9.0.0

  # Preferencias ligeras
  shared_preferences: ^2.2.0

  # Biometría
  local_auth: ^2.2.0

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Utilidades
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
