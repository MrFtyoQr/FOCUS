name: hipperapp
description: "Sistema de Hiperproductividad - Tree Tech Solutions"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  dio: ^5.7.0

  # Estado
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navegación
  go_router: ^13.2.0

  # Almacenamiento seguro (JWT)
  flutter_secure_storage: ^9.2.2

  # Preferencias ligeras (flags)
  shared_preferences: ^2.2.2

  # Biometría
  local_auth: ^2.3.0

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Utilidades
  intl: ^0.19.0
  uuid: ^4.2.1
  connectivity_plus: ^6.0.5

  # Gestos y animaciones
  flutter_slidable: ^3.0.1

  # Archivos y adjuntos
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  video_player: ^2.10.1
  audioplayers: ^6.5.1
  share_plus: ^10.1.2

  # Dispositivo
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.2
  crypto: ^3.0.3

  # Notificaciones locales
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.2

  # DB local (pantallas legacy — se migra en fases posteriores)
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - app.env
    - assets/images/
    - assets/icons/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Configuración de iconos de la app
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/hipericon.png"
  min_sdk_android: 21
